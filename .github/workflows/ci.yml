name: CI

on:
  workflow_call:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm spelling
      - run: pnpm test:docs
      - run: pnpm test:packages
      - run: pnpm test:consumers
      - run: pnpm test:pack

  python:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install build
      - run: PYTHONPATH=python/src python -m unittest discover -s python/tests -v
      - run: python -m build python
      - run: python -m pip install python/dist/*.whl
      - run: python -c "import accessibility_devkit; assert accessibility_devkit.__version__ == '1.1.0'"

  contracts:
    name: Runtime contract parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:contracts
