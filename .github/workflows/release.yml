name: Publish v1.1

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/ci.yml

  npm:
    name: Publish npm packages
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: npm install --global npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm changeset publish
        env:
          NPM_CONFIG_PROVENANCE: 'true'

  pypi:
    name: Publish Python package
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install build
      - run: python -m build python
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          print-hash: true

  release:
    name: Create GitHub release
    needs: [npm, pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "Accessibility Devkit $GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}

  verify-installs:
    name: Verify registry installs
    needs: [npm, pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npx --yes @accessibility-devkit/cli@1.1.0 contrast '#000000' '#ffffff'
      - run: python -m pip install accessibility-devkit==1.1.0
      - run: accessibility-devkit contrast '#000000' '#ffffff'
